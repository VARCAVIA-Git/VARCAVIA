syntax = "proto3";
package varcavia.arc;

// Richiesta di validazione a un membro del comitato
message ValidationRequest {
  string request_id = 1;
  bytes data = 2;
  varcavia.ddna.DataDna ddna = 3;
  int64 deadline_us = 4;
}

// Voto di un validatore
message ValidationVote {
  string request_id = 1;
  bytes node_id = 2;
  VoteType vote = 3;
  double confidence = 4;
  repeated string checks_passed = 5;
  repeated string checks_failed = 6;
  bytes signature = 7;
}

enum VoteType {
  APPROVE = 0;
  REJECT = 1;
  ABSTAIN = 2;
}

// Risultato del consenso
message ConsensusResult {
  string request_id = 1;
  Outcome outcome = 2;
  double score = 3;
  repeated ValidationVote votes = 4;
  int64 completed_at_us = 5;
}

enum Outcome {
  CONFIRMED = 0;
  REJECTED = 1;
  UNCERTAIN = 2;
}
