# Domini di dati supportati da VARCAVIA
# Ogni dominio ha priorità, parole chiave per classificazione,
# e parametri specifici per la validazione.

[domains.health]
label = "Sanità"
priority = "high"
keywords = ["paziente", "diagnosi", "farmaco", "clinico", "terapia", "patient", "diagnosis"]
